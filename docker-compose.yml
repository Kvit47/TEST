services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5555
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_CLIENT_URL=${NEXT_PUBLIC_CLIENT_URL}
        - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - NEXTAUTH_URL=${NEXTAUTH_URL}
        - GOOGLE_ID=${GOOGLE_ID}
        - GOOGLE_SECRET=${GOOGLE_SECRET}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - backend
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:Z
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
